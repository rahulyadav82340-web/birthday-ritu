<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ritu 🎂</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
}

/* Main Container */
.container {
    padding: 30px;
}

/* Main Photo */
.main-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-top: 20px;
}

/* Title */
h1 {
    margin-top: 15px;
    font-size: 35px;
}

/* Gallery */
.gallery {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.gallery img {
    width: 130px;
    height: 130px;
    border-radius: 15px;
    object-fit: cover;
    border: 3px solid white;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #ff4e8a;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
}

/* Surprise */
#toggle {
    display: none;
}

.surprise {
    max-height: 0;
    overflow: hidden;
    transition: 0.5s;
}

#toggle:checked ~ .surprise {
    max-height: 200px;
    margin-top: 20px;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: 0;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-800px);}
}
</style>

</head>

<body>

<div class="container">

    <!-- OUTSIDE PHOTO -->
    <img src="ritu.jpeg" class="main-img">

    <h1>🎉 Happy Birthday Ritu 🎂</h1>

    <p>Wishing you love, happiness and success always 💖</p>

    <!-- INSIDE GALLERY -->
    <div class="gallery">
        <img src="ritu2.jpeg">
        <img src="ritu3.jpeg">
    </div>

    <!-- SURPRISE -->
    <input type="checkbox" id="toggle">
    <label for="toggle" class="btn">Click for Surprise 🎁</label>

    <div class="surprise">
        <p style="font-size:20px;">
            💌 You are very special 💖<br>
            Stay happy always 😊<br>
            LOVE YOU BABY 🎉
        </p>
    </div>

</div>

<!-- Hearts -->
<div class="heart" style="left:10%;">💖</div>
<div class="heart" style="left:30%;">💗</div>
<div class="heart" style="left:50%;">💓</div>
<div class="heart" style="left:70%;">💞</div>
<div class="heart" style="left:90%;">💕</div>

</body>
</html>
